---
name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
      - 56098
  workflow_dispatch:

jobs:
  checkout:
    name: Checkout code
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: verify checkout
        run: |
          pwd
          ls -la

  separate-sbom-generation:
    name: SBOM generation
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: verify checkout
        run: |
          pwd
          ls -la
      - name: Run Trivy Locally
        continue-on-error: true       
        uses: docker://aquasec/aqua-scanner
        with:
          args:  trivy fs --reachability --sast --package-json --dotnet-proj \
                  --scanners vuln,misconfig,secret  --secret-config trivy-secret-rules.yaml   .
          # To customize which severities to scan for, add: --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          # To enable SAST scanning, add: --sast
          # To enable reachability scanning, add: --reachability
          # To enable npm/dotnet/gradle non-lock file scanning, add: --package-json / --dotnet-proj / --gradle
          # Update Comments
        env:
          AQUA_KEY: us0ZJ3QWlxzmSGdimQrg9j
          AQUA_SECRET: Kyul7jeyiktZBTjC6jcEvnB53OqJEPMgERu
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
          TRIVY_RUN_AS_PLUGIN: aqua
          TRIVY_USERNAME: ${{ secrets.AQUASEC_REGISTRY_USER_ID }}
          TRIVY_PASSWORD: ${{ secrets.AQUASEC_REGISTRY_PASSWORD }}
          AQUA_URL: https://api.eu-1.supply-chain.cloud.aquasec.com
          CSPM_URL: https://eu-1.api.cloudsploit.com 
